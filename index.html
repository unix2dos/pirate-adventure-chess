<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏴‍☠️ 海盗冒险棋</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a1628;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #header {
      text-align: center;
      padding: 8px;
      font-size: 1.4rem;
      font-weight: bold;
      background: rgba(0,0,0,0.3);
      letter-spacing: 2px;
    }
    #game-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    #canvas-wrapper {
      flex: 1 1 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }
    canvas {
      border: 3px solid #4a9eff;
      border-radius: 12px;
      background: #1a3a5c;
    }
    #sidebar {
      flex: 0 0 280px;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      background: rgba(0,0,0,0.2);
      border-left: 1px solid #1e3a5a;
      overflow-y: auto;
    }
    #footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: rgba(0,0,0,0.3);
      font-size: 0.85rem;
    }
    .panel-title {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #4a9eff;
  margin-bottom: 6px;
}
#players-panel .player-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 8px;
  margin-bottom: 4px;
  background: rgba(255,255,255,0.05);
  transition: background 0.3s;
}
#players-panel .player-row.active {
  background: rgba(74, 158, 255, 0.2);
  border: 1px solid #4a9eff;
}
#dice-panel {
  text-align: center;
  padding: 10px;
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
}
#dice-display {
  font-size: 3rem;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#btn-roll {
  width: 100%;
  padding: 10px;
  font-size: 1rem;
  background: #4a9eff;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  margin-top: 8px;
}
#btn-roll:disabled {
  background: #333;
  cursor: not-allowed;
}
#log-panel {
  flex: 1;
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
  padding: 8px;
  overflow-y: auto;
  font-size: 0.8rem;
  line-height: 1.5;
  color: #ccd;
  min-height: 100px;
}
.log-entry { margin-bottom: 4px; }
.log-entry.positive { color: #6f6; }
.log-entry.negative { color: #f66; }
.log-entry.interactive { color: #69f; }
    /* Screen overlays */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 22, 40, 0.97);
      z-index: 100;
    }
    .screen.hidden { display: none; }
  </style>
</head>
<body>
  <div id="header">🏴‍☠️ 海盗冒险棋</div>
  <div id="game-area">
    <div id="canvas-wrapper">
      <canvas id="board-canvas"></canvas>
    </div>
    <div id="sidebar">
      <div>
        <div class="panel-title">👤 玩家</div>
        <div id="players-panel"></div>
      </div>
      <div id="dice-panel">
        <div class="panel-title">🎲 骰子</div>
        <div id="dice-display">—</div>
        <button id="btn-roll" disabled>掷骰子</button>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <div class="panel-title">📜 事件日志</div>
        <div id="log-panel"></div>
      </div>
    </div>
  </div>
  <div id="footer">
    <div>
      <button id="btn-sound">🔊 音效</button>
      <button id="btn-rules">❓ 规则</button>
    </div>
    <div id="turn-info">回合 #1</div>
  </div>

  <!-- Start Screen -->
  <div id="start-screen" class="screen">
    <div style="text-align:center; max-width:400px;">
      <h1 style="font-size:2.5rem; margin-bottom:1rem;">🏴‍☠️ 海盗冒险棋</h1>
      <p style="color:#aaa; margin-bottom:2rem;">第一个到达宝箱(100格)的玩家获胜！</p>
      <button id="btn-start" style="padding:12px 40px; font-size:1.2rem; cursor:pointer;">
        ⚓ 开始冒险
      </button>
    </div>
  </div>

  <!-- Win Screen -->
  <div id="win-screen" class="screen hidden">
    <div style="text-align:center;">
      <div style="font-size:4rem;">🏆</div>
      <h2 id="win-message" style="font-size:2rem; margin: 1rem 0;"></h2>
      <button id="btn-replay" style="padding:10px 30px; font-size:1.1rem; cursor:pointer;">
        🔄 再来一局
      </button>
    </div>
  </div>

  <script>
    // ── CONSTANTS ──────────────────────────────────────────────────────────────
    const CELL_COUNT = 100;
    const BOARD_PADDING = 30;

    function computeSpiralCoords(canvasSize, padding) {
      const cells = new Array(CELL_COUNT);
      const gridSize = Math.floor((canvasSize - padding * 2) / 10);
      const origin = { x: padding, y: padding }; // top-left of grid

      let pos = 0;

      // rows 0-9 from top, cols 0-9 from left.
      // Cell 1 is at visual bottom-left = row 9, col 0.
      // We spiral: bottom-row L→R, right-col B→T, top-row R→L, left-col T→B (inward)

      let rowBottom = 9, rowTop = 0, colLeft = 0, colRight = 9;

      while (pos < CELL_COUNT) {
        // Bottom row: left → right (visual bottom = highest row index)
        for (let c = colLeft; c <= colRight && pos < CELL_COUNT; c++) {
          cells[pos++] = {
            x: origin.x + c * gridSize,
            y: origin.y + rowBottom * gridSize
          };
        }
        rowBottom--;

        // Right column: bottom → top (decreasing row index = going up)
        for (let r = rowBottom; r >= rowTop && pos < CELL_COUNT; r--) {
          cells[pos++] = {
            x: origin.x + colRight * gridSize,
            y: origin.y + r * gridSize
          };
        }
        colRight--;

        // Top row: right → left
        for (let c = colRight; c >= colLeft && pos < CELL_COUNT; c--) {
          cells[pos++] = {
            x: origin.x + c * gridSize,
            y: origin.y + rowTop * gridSize
          };
        }
        rowTop++;

        // Left column: top → bottom (increasing row = going down)
        for (let r = rowTop; r <= rowBottom && pos < CELL_COUNT; r++) {
          cells[pos++] = {
            x: origin.x + colLeft * gridSize,
            y: origin.y + r * gridSize
          };
        }
        colLeft++;
      }

      return cells.map((c, i) => ({ ...c, index: i + 1, size: gridSize, event: null }));
    }

    // ── BOARD ──────────────────────────────────────────────────────────────────
    class Board {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.size = Math.min(
          canvas.parentElement.clientWidth - 20,
          canvas.parentElement.clientHeight - 20
        );
        canvas.width = this.size;
        canvas.height = this.size;
        this.cells = computeSpiralCoords(this.size, BOARD_PADDING);
      }

      drawCell(cell, highlight = false) {
        const { ctx } = this;
        const s = cell.size;
        const x = cell.x + 1;
        const y = cell.y + 1;
        const w = s - 2;

        // Background
        ctx.fillStyle = highlight ? '#ffd700' : (cell.event ? cell.event.bgColor : '#1a4a7a');
        ctx.beginPath();
        ctx.roundRect(x, y, w, w, 4);
        ctx.fill();

        // Border
        ctx.strokeStyle = '#2a6aaa';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Cell number
        ctx.fillStyle = highlight ? '#000' : '#cce';
        ctx.font = `bold ${Math.floor(s * 0.22)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(cell.index, x + w / 2, y + 2);

        // Event emoji
        if (cell.event) {
          ctx.font = `${Math.floor(s * 0.32)}px sans-serif`;
          ctx.textBaseline = 'middle';
          ctx.fillText(cell.event.emoji, x + w / 2, y + w * 0.65);
        }
      }

      drawBoard(players = [], highlightCells = []) {
        const { ctx, size } = this;
        // Ocean background
        ctx.fillStyle = '#0d2d4a';
        ctx.fillRect(0, 0, size, size);

        // Draw cells
        this.cells.forEach(cell => {
          this.drawCell(cell, highlightCells.includes(cell.index));
        });

        // Center treasure (cell 100)
        const c100 = this.cells[99];
        ctx.font = `${Math.floor(c100.size * 0.5)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🏆', c100.x + c100.size / 2, c100.y + c100.size / 2);

        // Draw player pieces
        this.drawPieces(players);
      }

      drawPieces(players) {
        const { ctx } = this;
        players.forEach((player, i) => {
          if (player.position === 0) return;
          const cell = this.getCell(player.position);
          if (!cell) return;
          const s = cell.size;
          // Offset pieces within cell so multiple players on same cell are visible
          const offX = (i % 2) * (s * 0.35);
          const offY = Math.floor(i / 2) * (s * 0.35);
          const cx = cell.x + s * 0.25 + offX;
          const cy = cell.y + s * 0.45 + offY;

          // Circle background
          ctx.beginPath();
          ctx.arc(cx, cy, s * 0.18, 0, Math.PI * 2);
          ctx.fillStyle = player.color;
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 1.5;
          ctx.stroke();

          // Initial letter
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${Math.floor(s * 0.18)}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(player.name[0], cx, cy);
        });
      }

      getCell(index) {
        return this.cells[index - 1];
      }
    }

    // ── EVENT DEFINITIONS ──────────────────────────────────────────────────────
    const EVENT_TYPES = {
      PARROT:     { id: 'PARROT',    emoji: '🦜', name: '鹦鹉送信',   bgColor: '#1a5a2a', type: 'positive' },
      TREASURE_MAP:{ id: 'TREASURE_MAP', emoji: '🗺️', name: '藏宝图', bgColor: '#4a3a10', type: 'positive' },
      DOLPHIN:    { id: 'DOLPHIN',   emoji: '🐬', name: '海豚助力',   bgColor: '#1a4a5a', type: 'positive' },
      RAINBOW:    { id: 'RAINBOW',   emoji: '🌈', name: '彩虹桥',     bgColor: '#3a1a5a', type: 'positive' },
      WISH_STAR:  { id: 'WISH_STAR', emoji: '⭐', name: '许愿星',     bgColor: '#4a4a10', type: 'positive' },
      TURTLE:     { id: 'TURTLE',   emoji: '🐢', name: '海龟顺风车', bgColor: '#1a4a2a', type: 'positive' },
      OCTOPUS:    { id: 'OCTOPUS',  emoji: '🐙', name: '大章鱼',     bgColor: '#4a1a1a', type: 'negative' },
      STORM:      { id: 'STORM',    emoji: '🌪️', name: '遇到风暴',   bgColor: '#2a2a4a', type: 'negative' },
      ISLAND:     { id: 'ISLAND',   emoji: '🏝️', name: '美丽小岛',   bgColor: '#2a4a1a', type: 'negative' },
      SHARK:      { id: 'SHARK',    emoji: '🦈', name: '鲨鱼出没',   bgColor: '#4a2a1a', type: 'negative' },
      CURRENT:    { id: 'CURRENT',  emoji: '🌊', name: '神秘海流',   bgColor: '#1a2a4a', type: 'interactive' },
      DUEL:       { id: 'DUEL',     emoji: '⚔️', name: '海上决斗',   bgColor: '#4a2a2a', type: 'interactive' },
      SHARE:      { id: 'SHARE',    emoji: '🎁', name: '分享宝藏',   bgColor: '#2a4a4a', type: 'interactive' },
      CARNIVAL:   { id: 'CARNIVAL', emoji: '🎪', name: '海上嘉年华', bgColor: '#4a3a4a', type: 'interactive' },
      MAGNET:     { id: 'MAGNET',   emoji: '🧲', name: '磁力锚',     bgColor: '#3a3a4a', type: 'interactive' },
      SPIN:       { id: 'SPIN',     emoji: '🎲', name: '幸运转盘',   bgColor: '#4a4a2a', type: 'interactive' },
    };

    // Cell assignments: which cell number gets which event
    const PARROT_JUMPS = { 4: 14, 9: 31, 20: 38, 51: 67 };
    const OCTOPUS_DROPS = { 17: 7, 54: 34, 62: 44, 87: 70 };
    // Rainbow bridge pairs: cell → destination (bidirectional teleport)
    // Cell 26 → 82 (forward), Cell 74 → 19 (backward — the cost of the rainbow!)
    const RAINBOW_PAIRS = { 26: 82, 74: 19 };
    const SAFE_HARBORS = [10, 30, 50, 70];

    const CELL_EVENTS = {
      4: 'PARROT', 9: 'PARROT', 20: 'PARROT', 51: 'PARROT',
      6: 'TREASURE_MAP', 33: 'TREASURE_MAP', 76: 'TREASURE_MAP',
      13: 'DOLPHIN', 58: 'DOLPHIN',
      26: 'RAINBOW', 74: 'RAINBOW',
      42: 'WISH_STAR', 89: 'WISH_STAR',
      37: 'TURTLE', 68: 'TURTLE',
      17: 'OCTOPUS', 54: 'OCTOPUS', 62: 'OCTOPUS', 87: 'OCTOPUS',
      29: 'STORM', 57: 'STORM', 93: 'STORM',
      45: 'ISLAND', 71: 'ISLAND',
      22: 'SHARK', 83: 'SHARK',
      39: 'CURRENT',
      48: 'DUEL', 77: 'DUEL',
      15: 'SHARE', 60: 'SHARE',
      85: 'CARNIVAL',
      52: 'MAGNET',
      25: 'SPIN', 66: 'SPIN',
    };

    // ── PLAYER ─────────────────────────────────────────────────────────────────
    const PLAYER_COLORS = ['#ff4444', '#4488ff', '#44cc44', '#ffaa00'];
    const PLAYER_EMOJIS = ['🔴', '🔵', '🟢', '🟡'];

    class Player {
      constructor(id, name, color, isAI = false) {
        this.id = id;
        this.name = name;
        this.color = color;
        this.emoji = PLAYER_EMOJIS[id];
        this.isAI = isAI;
        this.position = 0;    // 0 = not yet on board; 1-100 = cell number
        this.skipTurns = 0;   // for ISLAND event
        this.turtleBuff = 0;  // remaining turns of +1 movement
      }
    }

    // ── DICE ───────────────────────────────────────────────────────────────────
    const DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];

    class Dice {
      constructor(displayEl) {
        this.displayEl = displayEl;
        this.rolling = false;
      }

      roll() {
        if (this.rolling) return Promise.resolve(null);
        return new Promise(resolve => {
          this.rolling = true;
          let count = 0;
          const total = 12;
          const interval = setInterval(() => {
            const face = Math.floor(Math.random() * 6);
            this.displayEl.textContent = DICE_FACES[face];
            count++;
            if (count >= total) {
              clearInterval(interval);
              const result = Math.floor(Math.random() * 6) + 1;
              this.displayEl.textContent = DICE_FACES[result - 1];
              this.rolling = false;
              resolve(result);
            }
          }, 60);
        });
      }
    }

    // ── UI HELPERS ─────────────────────────────────────────────────────────────
    function renderPlayersPanel(players, currentPlayerIndex) {
      const panel = document.getElementById('players-panel');
      panel.innerHTML = players.map((p, i) => `
        <div class="player-row ${i === currentPlayerIndex ? 'active' : ''}">
          <span>${p.emoji}</span>
          <span style="flex:1">${p.name}${p.isAI ? ' 🤖' : ''}</span>
          <span style="font-size:0.85rem; color:#4a9eff">格${p.position || '—'}</span>
          ${p.skipTurns > 0 ? '<span style="color:#f66">⚓跳过</span>' : ''}
          ${p.turtleBuff > 0 ? '<span style="color:#4f4">🐢+1</span>' : ''}
        </div>
      `).join('');
    }

    function addLog(text, type = 'normal') {
      const log = document.getElementById('log-panel');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = text;
      log.prepend(entry);
      while (log.children.length > 30) log.lastChild.remove();
    }

    // ── HELPERS ────────────────────────────────────────────────────────────────
    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    // Move player step-by-step with animation delay
    function animateMove(player, targetPos, players, delay = 180) {
      return new Promise(resolve => {
        const step = player.position < targetPos ? 1 : -1;
        const move = () => {
          player.position += step;
          if (player.position < 1) player.position = 1;
          if (player.position > 100) player.position = 100;
          board.drawBoard(players);
          if (player.position === targetPos) {
            resolve();
          } else {
            setTimeout(move, delay);
          }
        };
        setTimeout(move, delay);
      });
    }

    // ── EVENT SYSTEM (stub — will be replaced in Task 7) ──────────────────────
    class EventSystem {
      async trigger(eventId, player, engine) {
        const ev = EVENT_TYPES[eventId];
        const logType = ev.type === 'positive' ? 'positive' :
                        ev.type === 'negative' ? 'negative' : 'interactive';
        addLog(`${player.emoji} 踩到 ${ev.emoji} ${ev.name}！`, logType);
        await sleep(800);
      }
    }

    // ── GAME ENGINE ────────────────────────────────────────────────────────────
    class GameEngine {
      constructor(players) {
        this.players = players;
        this.currentIndex = 0;
        this.turnNumber = 1;
        this.dice = new Dice(document.getElementById('dice-display'));
        this.gameOver = false;
      }

      get currentPlayer() {
        return this.players[this.currentIndex];
      }

      nextPlayer() {
        this.currentIndex = (this.currentIndex + 1) % this.players.length;
        if (this.currentIndex === 0) this.turnNumber++;
        document.getElementById('turn-info').textContent = `回合 #${this.turnNumber}`;
      }

      async doTurn() {
        const player = this.currentPlayer;
        const rollBtn = document.getElementById('btn-roll');
        rollBtn.disabled = true;

        // Skip turn if anchored (ISLAND event)
        if (player.skipTurns > 0) {
          player.skipTurns--;
          addLog(`${player.name} 在小岛休息，跳过本回合。`, 'negative');
          renderPlayersPanel(this.players, this.currentIndex);
          await sleep(800);
          this.nextPlayer();
          renderPlayersPanel(this.players, this.currentIndex);
          this.enableRollForCurrentPlayer();
          return;
        }

        // Roll dice
        const roll = await this.dice.roll();
        if (roll === null) return; // concurrent call guard
        let moveBy = roll + (player.turtleBuff > 0 ? 1 : 0);
        if (player.turtleBuff > 0) player.turtleBuff--;
        addLog(`${player.emoji} ${player.name} 掷出 ${roll}${moveBy > roll ? '(+1🐢)' : ''} 点`);

        // Move
        const newPos = Math.min(player.position + moveBy, 100);
        await animateMove(player, newPos, this.players);

        // Check win
        if (player.position >= 100) {
          this.showWin(player);
          return;
        }

        // Trigger cell event
        const cell = board.getCell(player.position);
        if (cell && cell.event) {
          await eventSystem.trigger(cell.event.id, player, this);
        }

        // Check win again (events may have moved player to 100)
        if (player.position >= 100) {
          this.showWin(player);
          return;
        }

        renderPlayersPanel(this.players, this.currentIndex);
        this.nextPlayer();
        renderPlayersPanel(this.players, this.currentIndex);
        this.enableRollForCurrentPlayer();
      }

      enableRollForCurrentPlayer() {
        if (this.gameOver) return;
        const rollBtn = document.getElementById('btn-roll');
        if (this.currentPlayer.isAI) {
          setTimeout(() => this.doTurn(), 900);
        } else {
          rollBtn.disabled = false;
        }
      }

      showWin(player) {
        this.gameOver = true;
        document.getElementById('btn-roll').disabled = true;
        document.getElementById('win-message').textContent =
          `${player.emoji} ${player.name} 到达宝箱，赢了！🎉`;
        document.getElementById('win-screen').classList.remove('hidden');
      }
    }

    // ── GAME INIT ──────────────────────────────────────────────────────────────
    let board, eventSystem, engine;

    function startGame(playerConfigs) {
      let configs = playerConfigs;
      // Ensure at least 2 participants (add AI if only 1 human)
      if (configs.length === 1 && !configs[0].isAI) {
        configs = [...configs, { name: 'AI海盗', isAI: true }];
      }

      board = new Board(document.getElementById('board-canvas'));
      board.cells.forEach(cell => {
        const evId = CELL_EVENTS[cell.index];
        if (evId) cell.event = EVENT_TYPES[evId];
      });

      const players = configs.map((cfg, i) =>
        new Player(i, cfg.name, PLAYER_COLORS[i], cfg.isAI)
      );
      players.forEach(p => { p.position = 1; });

      eventSystem = new EventSystem();
      engine = new GameEngine(players);

      board.drawBoard(players);
      renderPlayersPanel(players, 0);
      addLog('🏴‍☠️ 游戏开始！第一个到达100格获胜！');

      const rollBtn = document.getElementById('btn-roll');
      rollBtn.onclick = () => engine.doTurn();
      engine.enableRollForCurrentPlayer();
    }

    document.getElementById('btn-start').addEventListener('click', () => {
      document.getElementById('start-screen').classList.add('hidden');
      startGame([
        { name: '你', isAI: false },
        { name: 'AI海盗', isAI: true },
      ]);
    });

    document.getElementById('btn-replay').addEventListener('click', () => {
      document.getElementById('win-screen').classList.add('hidden');
      document.getElementById('log-panel').innerHTML = '';
      document.getElementById('start-screen').classList.remove('hidden');
    });
  </script>
</body>
</html>
